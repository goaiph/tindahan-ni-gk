<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tindahan ni GK — Store System Demo</title>
<link rel="icon" type="image/png" id="favicon" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
<style>
    :root{
    --bg:#EEF1F8;
    --surface:#FFFFFF;
    --surface-2:#F5F7FC;
    --ink:#0B1020;
    --muted:#5E6580;
    --navy:#0A1130;
    --navy-2:#12193C;
    --navy-soft:#E8EBF7;
    --accent:#3B5BBF;
    --accent-deep:#2B3F86;
    --accent-soft:#E4EAFB;
    --alert:#C0392B;
    --alert-soft:#FBE7E4;
    --line:#E2E6F1;
    --line-2:#D2D8E8;
    --shadow:0 1px 3px rgba(11,16,32,.06), 0 4px 16px rgba(11,16,32,.08);
    --shadow-lg:0 8px 32px rgba(11,16,32,.12), 0 2px 8px rgba(11,16,32,.06);
    --font-ui:'Inter',system-ui,sans-serif;
    --font-display:'Playfair Display',Georgia,serif;
    --radius:16px;
    --radius-sm:11px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font-ui);
    font-feature-settings:'kern' 1,'liga' 1,'calt' 1;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    font-size:15px;
    line-height:1.45;
  }
  .num{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:focus-visible, .tab:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px}
  input{font-family:inherit;font-size:15px}

  /* ---------- App shell ---------- */
  .app{display:flex;min-height:100vh}
  .sidebar{
    width:236px;flex-shrink:0;background:var(--navy);color:#EAEDF8;
    display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;
  }
  .brand{display:flex;align-items:center;gap:11px;padding:4px 8px 22px}
  .brand .mark{
    width:44px;height:44px;border-radius:50%;flex-shrink:0;
    background:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.18);overflow:hidden;
  }
  .brand .mark img{width:100%;height:100%;display:block;object-fit:cover}
  .brand h1{font-family:var(--font-display);font-weight:700;font-size:17px;line-height:1.1;letter-spacing:-.1px;color:#fff}
  .brand span{font-size:10.5px;opacity:.55;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
  .nav button{
    display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;
    color:#C3CBE6;font-weight:500;font-size:13.5px;letter-spacing:.1px;text-align:left;width:100%;transition:.13s;
  }
  .nav button .ic{width:20px;height:20px;flex-shrink:0;opacity:.85}
  .nav button:hover{background:rgba(255,255,255,.07)}
  .nav button.active{background:var(--surface);color:var(--navy);box-shadow:var(--shadow)}
  .nav button.active .ic{opacity:1}
  .nav .badge{margin-left:auto;background:var(--alert);color:#fff;font-size:11px;font-weight:700;
    padding:1px 7px;border-radius:20px;min-width:20px;text-align:center}
  .nav button.active .badge{background:var(--alert)}
  .side-foot{margin-top:auto;padding:14px 10px 2px;border-top:1px solid rgba(255,255,255,.1);font-size:10.5px;opacity:.55;letter-spacing:.2px}
  .side-foot b{font-weight:700;opacity:.9}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    display:flex;align-items:center;gap:14px;padding:16px 26px;border-bottom:1px solid var(--line);
    background:var(--surface);position:sticky;top:0;z-index:20;
  }
  .topbar-logo{width:34px;height:34px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(10,17,48,.08)}
  .topbar .page-title{font-family:var(--font-display);font-size:21px;font-weight:700;letter-spacing:-.2px}
  .topbar .page-sub{font-size:12px;color:var(--muted);margin-top:2px;letter-spacing:.1px;font-weight:500}
  .demo-pill{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--accent-soft);
    color:var(--accent-deep);font-weight:600;font-size:11px;padding:5px 12px;border-radius:30px;letter-spacing:.3px;text-transform:uppercase}
  .demo-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .view{padding:22px 26px 90px;flex:1}

  /* ---------- POS ---------- */
  .pos{display:grid;grid-template-columns:1fr 372px;gap:20px;align-items:start}
  .pos-left{min-width:0}
  .search-row{display:flex;gap:10px;margin-bottom:16px}
  .search{
    flex:1;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line-2);
    border-radius:12px;padding:0 14px;box-shadow:var(--shadow);
  }
  .search input{border:none;background:none;outline:none;padding:13px 0;width:100%;color:var(--ink);font-weight:500;letter-spacing:-.1px}
  .search svg{opacity:.5;flex-shrink:0}
  .cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:thin}
  .cat{white-space:nowrap;padding:6px 14px;border-radius:30px;background:var(--surface);
    border:1px solid var(--line-2);font-weight:600;font-size:11.5px;color:var(--muted);letter-spacing:.2px;text-transform:uppercase;transition:.12s}
  .cat.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px}
  .prod{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    text-align:left;transition:.15s cubic-bezier(.2,.8,.2,1);position:relative;
    box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;
    cursor:pointer;
  }
  .prod:hover{transform:translateY(-3px);border-color:var(--accent);
    box-shadow:0 14px 32px rgba(10,17,48,.14)}
  .prod:active{transform:translateY(-1px)}
  .prod-img{
    width:100%;aspect-ratio:4/3;object-fit:cover;display:block;
    background:var(--surface-2);
    transition:transform .4s cubic-bezier(.2,.8,.2,1);
  }
  .prod:hover .prod-img{transform:scale(1.06)}
  .prod-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:3px;flex:1}
  .prod .pname{font-weight:600;font-size:12.5px;line-height:1.3;color:var(--ink);letter-spacing:-.1px}
  .prod .pprice{font-family:var(--font-display);font-weight:700;color:var(--navy);font-size:16px;margin-top:auto;padding-top:5px;font-feature-settings:'tnum' 1}
  .prod .pstock{
    position:absolute;top:8px;right:8px;font-size:10px;font-weight:800;
    color:#fff;background:rgba(10,17,48,.66);backdrop-filter:blur(6px) saturate(180%);
    padding:3px 9px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase;font-size:9.5px;
  }
  .prod.low .pstock{background:rgba(192,57,43,.82)}
  .prod.out{opacity:.55;pointer-events:none}
  .prod.out::after{
    content:'Ubos na';position:absolute;inset:0;display:grid;place-items:center;
    background:rgba(255,255,255,.72);backdrop-filter:blur(3px);
    font-weight:800;color:var(--alert);font-size:14px;
    border-radius:var(--radius);
  }
  .prod-img-wrap{position:relative;overflow:hidden}

  /* Cart */
  .cart{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);position:sticky;top:88px;display:flex;flex-direction:column;max-height:calc(100vh - 110px)}
  .cart-head{padding:16px 18px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
  .cart-head h3{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:-.2px}
  .cart-head .count{margin-left:auto;background:var(--navy-soft);color:var(--navy);font-weight:700;
    font-size:12px;padding:3px 10px;border-radius:20px}
  .cart-items{overflow-y:auto;padding:6px 10px;flex:1;min-height:90px}
  .citem{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:10px}
  .citem:hover{background:var(--surface-2)}
  .citem .ci-name{font-weight:600;font-size:13px;line-height:1.2;letter-spacing:-.1px}
  .citem .ci-price{font-size:11.5px;color:var(--muted)}
  .qty{display:flex;align-items:center;gap:0;background:var(--surface-2);border-radius:9px;border:1px solid var(--line-2)}
  .qty button{width:26px;height:26px;display:grid;place-items:center;font-weight:700;color:var(--navy);font-size:16px}
  .qty span{min-width:24px;text-align:center;font-weight:700;font-size:13px}
  .ci-total{font-weight:700;font-size:13.5px;min-width:58px;text-align:right}
  .cart-empty{text-align:center;color:var(--muted);padding:38px 20px;font-size:13.5px}
  .cart-empty .big{font-size:30px;margin-bottom:8px;opacity:.6}
  .cart-foot{border-top:1px solid var(--line);padding:14px 18px 16px;background:var(--surface-2);border-radius:0 0 var(--radius) var(--radius)}
  .totals .row{display:flex;justify-content:space-between;font-size:13.5px;color:var(--muted);margin-bottom:4px}
  .totals .grand{display:flex;justify-content:space-between;align-items:baseline;margin:8px 0 13px}
  .totals .grand .lbl{font-weight:600;font-size:14px}
  .totals .grand .amt{font-family:var(--font-display);font-weight:700;font-size:28px;color:var(--navy);letter-spacing:-.5px}
  .pay-methods{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
  .pm{padding:9px 4px;border-radius:10px;border:1.5px solid var(--line-2);background:var(--surface);
    font-weight:600;font-size:11px;letter-spacing:.2px;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.1s}
  .pm .pm-ic{font-size:15px}
  .pm.active{border-color:var(--navy);background:var(--navy-soft);color:var(--navy)}
  .pm.active.utang{border-color:var(--alert);background:var(--alert-soft);color:var(--alert)}
  .btn{width:100%;padding:14px;border-radius:12px;font-weight:700;font-size:13.5px;letter-spacing:.3px;text-transform:uppercase;transition:.12s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-go{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(59,91,191,.35);letter-spacing:.2px;font-size:14px;font-weight:700;text-transform:uppercase}
  .btn-go:hover{background:#12193C;transform:translateY(-1px)}
  .btn-go:disabled{background:var(--line-2);color:var(--muted);box-shadow:none;cursor:not-allowed;transform:none}

  /* ---------- Tables / cards (shared) ---------- */
  .cardbox{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .cardbox-head{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .cardbox-head h3{font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:-.2px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);
    font-weight:600;padding:11px 20px;border-bottom:1px solid var(--line);background:var(--surface-2)}
  th.r,td.r{text-align:right}
  td{padding:13px 20px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;letter-spacing:-.1px}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--surface-2)}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
  .tag.ok{background:var(--navy-soft);color:var(--navy)}
  .tag.low{background:var(--alert-soft);color:var(--alert)}
  .tag.warn{background:var(--accent-soft);color:#8a5807}
  .mini-btn{padding:7px 14px;border-radius:9px;font-weight:600;font-size:12px;letter-spacing:.1px;border:1px solid var(--line-2);background:var(--surface)}
  .mini-btn:hover{border-color:var(--navy);color:var(--navy)}
  .mini-btn.solid{background:var(--navy);color:#fff;border-color:var(--navy)}
  .mini-btn.solid:hover{background:#12193C}
  .mini-btn.clay{background:var(--alert);color:#fff;border-color:var(--alert)}

  /* ---------- Dashboard ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px 18px;box-shadow:var(--shadow)}
  .stat .s-lbl{font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.7px;text-transform:uppercase;display:flex;align-items:center;gap:7px}
  .stat .s-val{font-family:var(--font-display);font-size:30px;font-weight:700;margin-top:8px;line-height:1;letter-spacing:-.5px;font-feature-settings:'tnum' 1}
  .stat .s-sub{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:.1px;font-weight:500}
  .stat.accent{background:var(--navy);color:#EAF2EE;border-color:var(--navy)}
  .stat.accent .s-lbl{color:#AEB7D8}
  .stat.accent .s-val{color:#fff}
  .stat.accent .s-sub{color:#9098BC}
  .dash-cols{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start}
  .bars{padding:18px 20px}
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .bar-row .bl{width:120px;font-size:13.5px;font-weight:600;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{flex:1;height:11px;background:var(--surface-2);border-radius:20px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#3B5BBF);border-radius:20px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .bar-row .bv{font-size:13px;font-weight:700;color:var(--muted);width:46px;text-align:right;flex-shrink:0}
  .split{display:flex;gap:0;border-radius:12px;overflow:hidden;height:16px;margin:6px 0 14px;border:1px solid var(--line)}
  .split>div{height:100%}
  .legend{display:flex;flex-direction:column;gap:9px}
  .legend .lg{display:flex;align-items:center;gap:9px;font-size:13.5px}
  .legend .sw{width:13px;height:13px;border-radius:4px;flex-shrink:0}
  .legend .lg b{margin-left:auto;font-variant-numeric:tabular-nums}

  /* ---------- Modal / toast ---------- */
  .scrim{position:fixed;inset:0;background:rgba(28,27,22,.42);backdrop-filter:blur(2px);display:none;
    align-items:center;justify-content:center;z-index:60;padding:20px;animation:fade .15s}
  .scrim.show{display:flex}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:var(--surface);border-radius:20px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.3);
    overflow:hidden;animation:pop .2s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes pop{from{transform:scale(.94) translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .modal-head{padding:20px 22px 4px}
  .modal-head h3{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-.3px}
  .modal-head p{font-size:12.5px;color:var(--muted);margin-top:4px;font-weight:500}
  .modal-body{padding:14px 22px 22px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.7px}
  .field input, .field select{width:100%;padding:12px 13px;border:1.5px solid var(--line-2);border-radius:11px;
    background:var(--surface-2);outline:none;color:var(--ink);font-weight:500;font-size:15px;letter-spacing:-.1px}
  .field input:focus, .field select:focus{border-color:var(--navy);background:var(--surface)}
  .modal-foot{display:flex;gap:10px;margin-top:6px}
  .modal-foot .btn{padding:13px}
  .btn-ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line-2)}
  .btn-ghost:hover{background:var(--line)}
  .btn-green{background:var(--navy);color:#fff}
  .btn-green:hover{background:#12193C}

  .receipt{font-family:'Inter',system-ui,sans-serif;padding:4px 0 2px}
  .receipt .r-line{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--muted)}
  .receipt .r-line.b{color:var(--ink);font-weight:600}
  .receipt .r-div{border-top:1px dashed var(--line-2);margin:8px 0}
  .receipt .r-grand{display:flex;justify-content:space-between;font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--navy);margin:4px 0;letter-spacing:-.2px}
  .receipt .r-change{display:flex;justify-content:space-between;font-weight:700;font-size:15px;color:var(--accent-deep);background:var(--accent-soft);padding:9px 12px;border-radius:10px;margin-top:8px}
  .check-ic{width:54px;height:54px;border-radius:50%;background:var(--navy-soft);display:grid;place-items:center;margin:0 auto 12px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--ink);color:#fff;padding:13px 20px;border-radius:13px;font-weight:600;font-size:14px;
    display:flex;align-items:center;gap:10px;box-shadow:0 12px 30px rgba(0,0,0,.3);z-index:80;opacity:0;
    transition:.3s cubic-bezier(.2,.9,.3,1.2);pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast .t-ic{color:var(--accent)}

  .ledger-list{padding:6px 0}
  .ledger-item{display:flex;align-items:center;gap:12px;padding:11px 22px;border-bottom:1px solid var(--line)}
  .ledger-item:last-child{border:none}
  .ledger-item .li-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;font-size:15px}
  .li-ic.charge{background:var(--alert-soft)}
  .li-ic.pay{background:var(--navy-soft)}
  .ledger-item .li-amt{margin-left:auto;font-weight:700;font-size:14px}
  .li-amt.charge{color:var(--alert)}
  .li-amt.pay{color:var(--navy)}

  .empty-note{text-align:center;color:var(--muted);padding:40px;font-size:14px}

  /* mobile bottom nav */
  .mobnav{display:none}

  @media(max-width:980px){
    .pos{grid-template-columns:1fr}
    .cart{position:fixed;bottom:64px;left:0;right:0;top:auto;border-radius:18px 18px 0 0;max-height:62vh;
      box-shadow:0 -10px 30px rgba(0,0,0,.18);z-index:40;transform:translateY(calc(100% - 60px));transition:.25s}
    .cart.open{transform:translateY(0)}
    .cart-head{cursor:pointer}
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .dash-cols{grid-template-columns:1fr}
  }
  @media(max-width:760px){
    .sidebar{display:none}
    .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--navy);z-index:50;
      padding:7px 6px;justify-content:space-around;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
    .mobnav button{display:flex;flex-direction:column;align-items:center;gap:2px;color:#AEB7D8;font-size:9.5px;font-weight:600;padding:5px 5px;border-radius:10px;position:relative;min-width:0;flex:1}
    .mobnav button.active{color:#fff}
    .mobnav button.active .ic{opacity:1}
    .mobnav .ic{opacity:.7}
    .mobnav .mbadge{position:absolute;top:0;right:6px;background:var(--alert);color:#fff;font-size:9px;font-weight:700;padding:0 5px;border-radius:10px}
    .view{padding:16px 14px 150px}
    .topbar{padding:13px 16px}
    .topbar .page-title{font-size:19px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(108px,1fr))}
  }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="mark"><img id="brandLogo" alt="Tindahan ni GK"></div>
      <div>
        <h1>Tindahan ni GK</h1>
        <span>Store Operations System</span>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      Demo build by <b>Go Ai PH</b><br>Para sa community-driven na negosyo.
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <img id="topLogo" class="topbar-logo" alt="Tindahan ni GK" />
      <div>
        <div class="page-title" id="pageTitle">Benta (POS)</div>
        <div class="page-sub" id="pageSub">Mabilis na pag-benta at resibo</div>
      </div>
      <div class="demo-pill"><span class="dot"></span> LIVE DEMO</div>
    </header>
    <div class="view" id="view"></div>
  </main>
</div>

<!-- Mobile nav -->
<nav class="mobnav" id="mobnav"></nav>

<!-- Modal -->

  {id:1005, ts:tseed(10,22),items:[{name:'Load Card ₱50',qty:2,price:53,photo:'https://images.unsplash.com/photo-1512499617640-c74ae3a79d37?w=60&h=60&fit=crop&auto=format&q=70'}], total:106, method:'gcash'},

  {id:1007, ts:tseed(12,44),items:[{name:'Pancit Canton',qty:4,price:18,photo:'https://images.unsplash.com/photo-1569050467447-ce54b3bbc37d?w=60&h=60&fit=crop&auto=format&q=70'},{name:'Tubig 1L',qty:2,price:20,photo:'https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=60&h=60&fit=crop&auto=format&q=70'}], total:112, method:'maya'},

/* ============ STATE ============ */
let view = 'pos';
let cart = {};            // {productId: qty}
let payMethod = 'cash';
let activeCat = 'Lahat';
let searchQ = '';
let utangCustomerId = null; // for utang sales

const PESO = n => '₱' + n.toLocaleString('en-PH',{minimumFractionDigits:0,maximumFractionDigits:2});
const $ = id => document.getElementById(id);

/* ============ NAV ============ */
const PAGES = [
  {id:'pos', label:'Benta', sub:'Mabilis na pag-benta at resibo', title:'Benta (POS)', ic:IC.cart},
  {id:'inv', label:'Stock', sub:'Imbentaryo at low-stock alerts', title:'Imbentaryo', ic:IC.box},
  {id:'utang', label:'Listahan', sub:'Utang at bayad ng mga suki', title:'Listahan ng Utang', ic:IC.ledger},
  {id:'dash', label:'Ulat', sub:'Benta, best-sellers at performance', title:'Ulat at Dashboard', ic:IC.chart},
  {id:'txn',  label:'Kasaysayan', sub:'Lahat ng transaksyon ngayon', title:'Kasaysayan ng Benta', ic:IC.receipt, moblabel:'Kasaysayan'},
];
function lowStockCount(){ return products.filter(p=>p.stock<=REORDER).length; }
function renderNav(){
  $('nav').innerHTML = PAGES.map(p=>{
    const badge = p.id==='inv' && lowStockCount() ? `<span class="badge">${lowStockCount()}</span>`:'';
    return `<button class="${view===p.id?'active':''}" onclick="go('${p.id}')">${p.ic}<span>${p.label}</span>${badge}</button>`;
  }).join('');
  $('mobnav').innerHTML = PAGES.map(p=>{
    const badge = p.id==='inv' && lowStockCount() ? `<span class="mbadge">${lowStockCount()}</span>`:'';
    return `<button class="${view===p.id?'active':''}" onclick="go('${p.id}')">${p.ic}${p.label}${badge}</button>`;
  }).join('');
}
function go(id){ view=id; const p=PAGES.find(x=>x.id===id); $('pageTitle').textContent=p.title; $('pageSub').textContent=p.sub; renderNav(); render(); window.scrollTo(0,0); }

/* ============ RENDER ROUTER ============ */
function render(){
  if(view==='pos') renderPOS();
  else if(view==='inv') renderInv();
  else if(view==='utang') renderUtang();
  else if(view==='dash') renderDash();
  else if(view==='txn')  renderTxn();
}

/* ============ POS ============ */
function renderPOS(){
  const cats = ['Lahat', ...new Set(products.map(p=>p.cat))];
  let filtered = products.filter(p=>{
    const okCat = activeCat==='Lahat' || p.cat===activeCat;
    const okQ = !searchQ || p.name.toLowerCase().includes(searchQ.toLowerCase());
    return okCat && okQ;
  });
  $('view').innerHTML = `
  <div class="pos">
    <div class="pos-left">
      <div class="search-row">
        <label class="search">${IC.search}
          <input id="posSearch" placeholder="Hanapin ang produkto..." value="${searchQ}" oninput="onSearch(this.value)" />
        </label>
      </div>
      <div class="cats">
        ${cats.map(c=>`<button class="cat ${activeCat===c?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('')}
      </div>
      <div class="grid">
        ${filtered.map(p=>{
          const cls = p.stock<=0?'out':(p.stock<=REORDER?'low':'');
          return `<button class="prod ${cls}" onclick="addToCart(${p.id})">
            <div class="prod-img-wrap">
              <img class="prod-img" src="${p.photo}" alt="${p.name}" loading="lazy"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
              <div style="display:none;aspect-ratio:4/3;align-items:center;justify-content:center;
                font-size:28px;background:var(--surface-2)">${p.emoji||'📦'}</div>
              <span class="pstock">${p.stock} pcs</span>
            </div>
            <div class="prod-body">
              <span class="pname">${p.name}</span>
              <span class="pprice num">${PESO(p.price)}</span>
            </div>
          </button>`;
        }).join('') || '<div class="empty-note">Walang nahanap na produkto.</div>'}
      </div>
    </div>
    ${renderCart()}
  </div>`;
}
function onSearch(v){ searchQ=v; const f=document.activeElement; renderPOS(); const i=$('posSearch'); if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);} }
function setCat(c){ activeCat=c; renderPOS(); }

function renderCart(){
  const items = Object.entries(cart).map(([id,qty])=>{ const p=products.find(x=>x.id==id); return {...p,qty}; });
  const count = items.reduce((s,i)=>s+i.qty,0);
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  const isUtang = payMethod==='utang';
  return `<div class="cart" id="cartEl">
    <div class="cart-head" onclick="toggleCart()">
      ${IC.cart}<h3>Order</h3><span class="count">${count} item${count!==1?'s':''}</span>
    </div>
    <div class="cart-items">
      ${items.length? items.map(i=>`
        <div class="citem">
          <img src="${i.photo||''}" alt="${i.name}"
            style="width:42px;height:42px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--surface-2)"
            onerror="this.src='';this.style.background='var(--surface-2)';this.style.display='none'" />
          <div style="flex:1;min-width:0">
            <div class="ci-name">${i.name}</div>
            <div class="ci-price num">${PESO(i.price)}</div>
          </div>
          <div class="qty">
            <button onclick="event.stopPropagation();chgQty(${i.id},-1)">−</button>
            <span class="num">${i.qty}</span>
            <button onclick="event.stopPropagation();chgQty(${i.id},1)">+</button>
          </div>
          <div class="ci-total num">${PESO(i.price*i.qty)}</div>
        </div>`).join('')
        : `<div class="cart-empty"><div class="big">🛒</div>Wala pang laman.<br>I-tap ang produkto para idagdag.</div>`}
    </div>
    <div class="cart-foot">
      <div class="totals">
        <div class="row"><span>Bilang ng item</span><span class="num">${count}</span></div>
        <div class="grand"><span class="lbl">Kabuuan</span><span class="amt num">${PESO(total)}</span></div>
      </div>
      <div class="pay-methods">
        ${[['cash','💵','Cash'],['gcash','🟦','GCash'],['maya','🟩','Maya'],['utang','📒','Utang']].map(([m,ic,lbl])=>
          `<button class="pm ${payMethod===m?'active':''} ${m==='utang'?'utang':''}" onclick="setPay('${m}')"><span class="pm-ic">${ic}</span>${lbl}</button>`).join('')}
      </div>
      <button class="btn btn-go" ${count===0?'disabled':''} onclick="checkout()">
        ${isUtang?'📒 Ilista sa Utang':'Tapusin ang Benta'} ${count?'• '+PESO(total):''}
      </button>
    </div>
  </div>`;
}
function toggleCart(){ if(window.innerWidth<=980) $('cartEl').classList.toggle('open'); }
function addToCart(id){
  const p=products.find(x=>x.id===id);
  if(p.stock<=0) return;
  const inCart=cart[id]||0;
  if(inCart>=p.stock){ toast('Wala nang stock para dito'); return; }
  cart[id]=inCart+1;
  if(view==='pos') renderPOS();
  toast(p.name+' added');
}
function chgQty(id,d){
  const p=products.find(x=>x.id===id);
  let q=(cart[id]||0)+d;
  if(q>p.stock){ toast('Abot na sa available stock'); return; }
  if(q<=0) delete cart[id]; else cart[id]=q;
  renderPOS();
}
function setPay(m){ payMethod=m; renderPOS(); }

/* ============ CHECKOUT ============ */
function checkout(){
  const items=Object.entries(cart).map(([id,qty])=>{const p=products.find(x=>x.id==id);return {id:p.id,name:p.name,emoji:p.emoji||'📦',photo:p.photo||'',price:p.price,qty};});
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  if(!items.length) return;
  if(payMethod==='utang'){ openUtangPick(items,total); return; }
  finalizeSale(items,total,payMethod,null);
}
function finalizeSale(items,total,method,customerId){
  // decrement stock + count sold
  items.forEach(it=>{ const p=products.find(x=>x.id===it.id); if(p){ p.stock-=it.qty; p.sold+=it.qty; }});
  const txn={id:Date.now(), ts:new Date(), items:items.map(i=>({name:i.name,qty:i.qty,price:i.price,photo:i.photo||''})), total, method, customerId};
  transactions.push(txn);
  if(method==='utang' && customerId){ const c=customers.find(x=>x.id===customerId); c.balance+=total; c.ledger.push({date:'Ngayon',type:'charge',amt:total,note:items.length+' item(s)'}); }
  showReceipt(items,total,method,customerId);
  cart={}; payMethod='cash'; renderNav();
}
function showReceipt(items,total,method,customerId){
  const methodLbl={cash:'Cash',gcash:'GCash',maya:'Maya',utang:'Utang (Listahan)'}[method];
  let payHtml='';
  if(method==='cash'){
    payHtml=`<div class="field" style="margin-top:6px"><label>Bayad ng customer (Cash)</label>
      <input id="cashIn" type="number" inputmode="numeric" placeholder="Halimbawa: ${Math.ceil(total/50)*50}" oninput="calcChange(${total})" /></div>
      <div class="receipt"><div class="r-change" id="changeBox" style="display:none"><span>Sukli</span><span class="num" id="changeAmt">₱0</span></div></div>`;
  }
  const custName = customerId? customers.find(c=>c.id===customerId).name : '';
  openModal(`
    <div class="modal-head" style="text-align:center;padding-top:22px">
      <img src="${LOGO}" alt="" style="width:30px;height:30px;border-radius:50%;margin:0 auto 10px;display:block;opacity:.9" />
      <div class="check-ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0A1130" stroke-width="3"><path d="m5 13 4 4L19 7"/></svg></div>
      <h3>${method==='utang'?'Nailista na sa Utang':'Tapos na ang Benta!'}</h3>
      <p>${method==='utang'? 'Idinagdag kay '+custName : 'Salamat sa pagbili'}</p>
    </div>
    <div class="modal-body">
      <div class="receipt">
        ${items.map(i=>`<div class="r-line" style="display:flex;align-items:center;gap:8px;padding:5px 0">
          <img src="${i.photo||''}" alt="" style="width:34px;height:34px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--surface-2)"
            onerror="this.style.display='none'" />
          <span style="flex:1">${i.qty}× ${i.name}</span>
          <span class="num">${PESO(i.price*i.qty)}</span>
        </div>`).join('')}
        <div class="r-div"></div>
        <div class="r-line b"><span>Paraan ng bayad</span><span>${methodLbl}</span></div>
        <div class="r-grand"><span>Kabuuan</span><span class="num">${PESO(total)}</span></div>
      </div>
      ${payHtml}
      <div class="modal-foot"><button class="btn btn-green" onclick="closeModal()">Tapos na</button></div>
    </div>`);
}
function calcChange(total){
  const v=parseFloat($('cashIn').value||0); const box=$('changeBox');
  if(v>=total){ box.style.display='flex'; $('changeAmt').textContent=PESO(v-total); }
  else box.style.display='none';
}
function openUtangPick(items,total){
  openModal(`
    <div class="modal-head"><h3>Ilista sa Utang</h3><p>Piliin kung sino ang uutang • ${PESO(total)}</p></div>
    <div class="modal-body">
      <div class="field"><label>Suki / Customer</label>
        <select id="utangSel">
          ${customers.map(c=>`<option value="${c.id}">${c.name} — kasalukuyang utang ${PESO(c.balance)}</option>`).join('')}
        </select>
      </div>
      <p style="font-size:12.5px;color:var(--muted);margin-bottom:4px">Auto-update ang balance sa Listahan at mababawas sa stock.</p>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Kanselahin</button>
        <button class="btn btn-green" onclick="confirmUtang()">Ilista</button>
      </div>
    </div>`);
  // stash
  window._pendingUtang={items,total};
}
function confirmUtang(){
  const cid=parseInt($('utangSel').value);
  const {items,total}=window._pendingUtang;
  closeModal();
  setTimeout(()=>finalizeSale(items,total,'utang',cid),120);
}

/* ============ INVENTORY ============ */

  const low=products.filter(p=>p.stock<=REORDER).length;
  $('view').innerHTML=`
  ${low?`<div class="cardbox" style="margin-bottom:18px;background:var(--alert-soft);border-color:#e9c4b2">
    <div style="padding:14px 20px;display:flex;align-items:center;gap:11px">
      <span style="font-size:20px">⚠️</span>
      <div><b style="color:var(--alert)">${low} produkto ang paubos na.</b>
      <span style="color:#8a4326;font-size:13px"> Kailangan nang mag-order ulit.</span></div>
    </div></div>`:''}
  <div class="cardbox">
    <div class="cardbox-head">
      <h3>Imbentaryo</h3>
      <span style="font-size:13px;color:var(--muted)">${products.length} produkto • auto-bawas tuwing may benta</span>
      <button class="mini-btn solid" style="margin-left:auto" onclick="openAddProduct()">+ Bagong Produkto</button>
    </div>
    <table>
      <thead><tr><th>Produkto</th><th>Kategorya</th><th class="r">Presyo</th><th class="r">Stock</th><th>Status</th><th class="r">Nabenta</th><th></th></tr></thead>
      <tbody>
        ${products.map(p=>{

          return `<tr>
            <td style="display:flex;align-items:center;gap:10px">
              <img src="${p.photo||''}" alt="${p.name}" style="width:40px;height:40px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--surface-2)"
                onerror="this.style.display='none'" /><b>${p.name}</b></td>
            <td style="color:var(--muted)">${p.cat}</td>
            <td class="r num">${PESO(p.price)}</td>
            <td class="r num"><b>${p.stock}</b></td>
            <td>${st}</td>
            <td class="r num" style="color:var(--muted)">${p.sold}</td>
            <td class="r"><button class="mini-btn" onclick="openRestock(${p.id})">+ Stock</button></td>

}
function openRestock(id){
  const p=products.find(x=>x.id===id);
  openModal(`
    <div class="modal-head"><h3>Dagdag Stock</h3><p>${p.emoji} ${p.name} • meron na: ${p.stock}</p></div>
    <div class="modal-body">
      <div class="field"><label>Ilang dadagdagin?</label>
        <input id="restockN" type="number" inputmode="numeric" placeholder="Halimbawa: 50" autofocus /></div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Kanselahin</button>
        <button class="btn btn-green" onclick="doRestock(${id})">I-save</button>
      </div>
    </div>`);
}
function doRestock(id){
  const n=parseInt($('restockN').value||0); if(!n||n<=0){toast('Maglagay ng bilang');return;}
  const p=products.find(x=>x.id===id); p.stock+=n; closeModal(); renderNav(); renderInv();
  toast('+'+n+' stock para sa '+p.name);
}
function openAddProduct(){
  openModal(`
    <div class="modal-head"><h3>Bagong Produkto</h3><p>Idagdag sa imbentaryo</p></div>
    <div class="modal-body">
      <div class="field"><label>Pangalan</label><input id="npName" placeholder="Hal: Mantika 1L" autofocus/></div>
      <div class="field"><label>Kategorya</label>
        <select id="npCat">${[...new Set(products.map(p=>p.cat))].map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div style="display:flex;gap:10px">
        <div class="field" style="flex:1"><label>Presyo (₱)</label><input id="npPrice" type="number" placeholder="0"/></div>
        <div class="field" style="flex:1"><label>Simulang Stock</label><input id="npStock" type="number" placeholder="0"/></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Kanselahin</button>
        <button class="btn btn-green" onclick="doAddProduct()">Idagdag</button>
      </div>
    </div>`);
}
function doAddProduct(){
  const name=$('npName').value.trim(); const price=parseFloat($('npPrice').value||0); const stock=parseInt($('npStock').value||0);
  if(!name||!price){toast('Kailangan ng pangalan at presyo');return;}
  products.push({id:Date.now(),name,cat:$('npCat').value,emoji:'📦',photo:'',price,stock,sold:0});
  closeModal(); renderNav(); renderInv(); toast(name+' naidagdag na');
}

/* ============ UTANG / LISTAHAN ============ */

    <div class="cardbox-head"><h3>Listahan ng Utang</h3>
      <span style="font-size:13px;color:var(--muted)">Wala nang notebook — naka-record na lahat</span>

function openLedger(id){
  const c=customers.find(x=>x.id===id);
  openModal(`
    <div class="modal-head"><h3>${c.name}</h3><p>Utang ngayon: <b style="color:${c.balance>0?'var(--alert)':'var(--navy)'}">${PESO(c.balance)}</b></p></div>

      ${[...c.ledger].reverse().map(l=>`
        <div class="ledger-item">
          <div class="li-ic ${l.type}">${l.type==='charge'?'📥':'✓'}</div>
          <div><div style="font-weight:600;font-size:13.5px">${l.type==='charge'?'Utang':'Bayad'}</div>
          <div style="font-size:12px;color:var(--muted)">${l.date} • ${l.note}</div></div>
          <div class="li-amt ${l.type} num">${l.type==='charge'?'+':'−'}${PESO(l.amt)}</div>
        </div>`).join('')}
    </div>
    <div class="modal-body" style="padding-top:8px">
      <div class="modal-foot">
        ${c.balance>0?`<button class="btn btn-green" onclick="closeModal();setTimeout(()=>openPayUtang(${c.id}),120)">Magbayad</button>`:`<button class="btn btn-ghost" onclick="closeModal()">Isara</button>`}
      </div>
    </div>`);
}
function openPayUtang(id){
  const c=customers.find(x=>x.id===id);
  openModal(`
    <div class="modal-head"><h3>Bayad sa Utang</h3><p>${c.name} • utang: ${PESO(c.balance)}</p></div>
    <div class="modal-body">
      <div class="field"><label>Magkano ang babayaran?</label>
        <input id="payN" type="number" inputmode="numeric" placeholder="Hanggang ${c.balance}" autofocus/></div>
      <button class="mini-btn" onclick="$('payN').value=${c.balance};" style="margin-bottom:12px">Bayaran lahat (${PESO(c.balance)})</button>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Kanselahin</button>
        <button class="btn btn-green" onclick="doPayUtang(${id})">I-record ang bayad</button>
      </div>
    </div>`);
}
function doPayUtang(id){
  const c=customers.find(x=>x.id===id);
  let n=parseFloat($('payN').value||0);
  if(!n||n<=0){toast('Maglagay ng halaga');return;}
  if(n>c.balance) n=c.balance;
  c.balance-=n; c.ledger.push({date:'Ngayon',type:'pay',amt:n,note:'Bayad'});
  closeModal(); renderUtang(); toast(PESO(n)+' bayad — na-record');
}
function openAddCustomer(){
  openModal(`
    <div class="modal-head"><h3>Bagong Suki</h3><p>Magdagdag sa listahan</p></div>
    <div class="modal-body">
      <div class="field"><label>Pangalan ng suki</label><input id="ncName" placeholder="Hal: Aling Maria" autofocus/></div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Kanselahin</button>
        <button class="btn btn-green" onclick="doAddCustomer()">Idagdag</button>
      </div>
    </div>`);
}
function doAddCustomer(){
  const name=$('ncName').value.trim(); if(!name){toast('Kailangan ng pangalan');return;}
  customers.push({id:Date.now(),name,balance:0,ledger:[]});
  closeModal(); renderUtang(); toast(name+' naidagdag sa listahan');
}


/* ============ TRANSACTIONS HISTORY ============ */
function renderTxn(){
  const methodLbl={cash:'Cash',gcash:'GCash',maya:'Maya',utang:'Utang'};
  const methodColor={cash:'var(--navy)',gcash:'var(--accent)',maya:'#6E86C8',utang:'var(--alert)'};
  const dayTotal=transactions.reduce((s,t)=>s+t.total,0);
  const txSorted=[...transactions].reverse(); // newest first
  const dayStr=TODAY.toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  $('view').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:700;letter-spacing:-.2px">${dayStr}</div>
      <div style="font-size:12.5px;color:var(--muted);margin-top:2px">${transactions.length} transaksyon • kabuuan ${PESO(dayTotal)}</div>
    </div>
    <button class="mini-btn" onclick="go('dash')">← Bumalik sa Ulat</button>
  </div>
  <div class="cardbox">
    <div class="cardbox-head" style="gap:10px;flex-wrap:wrap">
      <h3>Lahat ng Transaksyon</h3>
      <span style="font-size:13px;color:var(--muted);margin-left:auto">${transactions.length} benta ngayon • ${PESO(dayTotal)} total</span>
    </div>
    ${txSorted.length ? txSorted.map((t,i)=>{
      const timeStr = t.ts ? t.ts.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true}) : '';
      const itemSummary = t.items.map(it=>it.qty+'× '+it.name).join(', ');
      const custName = t.customerId ? (customers.find(c=>c.id===t.customerId)?.name||'') : '';
      return `<div style="display:flex;align-items:flex-start;gap:14px;padding:14px 20px;border-bottom:1px solid var(--line)">
        <div style="min-width:38px;text-align:center">
          <div style="font-weight:800;font-size:15px;color:var(--navy)">#${transactions.length - i}</div>
          <div style="font-size:10.5px;color:var(--muted);margin-top:2px">${timeStr}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;margin-top:2px">
          ${t.items.slice(0,3).map(it=>
            it.photo ? `<img src="${it.photo}" alt="${it.name}" style="width:38px;height:38px;border-radius:8px;object-fit:cover;background:var(--surface-2)" onerror="this.style.display='none'" />`
            : `<div style="width:38px;height:38px;border-radius:8px;background:var(--surface-2)"></div>`
          ).join('')}
          ${t.items.length>3?`<div style="width:38px;height:38px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--muted)">+${t.items.length-3}</div>`:''}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${itemSummary}</div>
          ${custName?`<div style="font-size:11.5px;color:var(--muted);margin-top:2px">📒 ${custName}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-weight:800;font-size:15px" class="num">${PESO(t.total)}</div>
          <div style="margin-top:4px"><span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--navy-soft);color:${methodColor[t.method]||'var(--navy)'}">${methodLbl[t.method]||t.method}</span></div>
        </div>
      </div>`;
    }).join('')
    : '<div class="empty-note" style="padding:40px">Wala pang benta ngayon. Magsimula sa Benta tab.</div>'}
    ${transactions.length ? `
    <div style="padding:16px 20px;background:var(--surface-2);border-top:2px solid var(--line);display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:13px;color:var(--muted)">${transactions.length} transaksyon ngayon</div>
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:700;letter-spacing:-.4px;color:var(--navy)" class="num">${PESO(dayTotal)}</div>
    </div>` : ''}
  </div>`;
}

/* ============ DASHBOARD ============ */
function renderDash(){
  const salesTotal=transactions.reduce((s,t)=>s+t.total,0);
  const cnt=transactions.length;
  const ave= cnt? salesTotal/cnt:0;
  const byMethod={cash:0,gcash:0,maya:0,utang:0};
  transactions.forEach(t=>byMethod[t.method]=(byMethod[t.method]||0)+t.total);
  const totalUtang=customers.reduce((s,c)=>s+c.balance,0);
  const low=products.filter(p=>p.stock<=REORDER);
  // best sellers by sold qty
  const top=[...products].sort((a,b)=>b.sold-a.sold).slice(0,6);
  const maxSold=top[0]?.sold||1;
  const methodColors={cash:'#0A1130',gcash:'#3B5BBF',maya:'#6E86C8',utang:'#C0392B'};
  const methodTotal=Object.values(byMethod).reduce((a,b)=>a+b,0)||1;

  const dayStr = TODAY.toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  $('view').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:700;letter-spacing:-.2px">Ulat — ${dayStr}</div>
      <div style="font-size:12.5px;color:var(--muted);margin-top:2px">Auto-update sa bawat benta. Subukan: gumawa ng benta, bumalik dito.</div>
    </div>
    <button class="mini-btn" onclick="go('txn')" style="white-space:nowrap">Tingnan ang lahat ng transaksyon →</button>
  </div>
  <div class="stat-grid">
    <div class="stat accent"><div class="s-lbl">💰 Benta ngayon</div><div class="s-val num">${PESO(salesTotal)}</div><div class="s-sub">${cnt} transaksyon</div></div>
    <div class="stat"><div class="s-lbl">🧾 Average bawat benta</div><div class="s-val num">${PESO(Math.round(ave))}</div><div class="s-sub">per transaksyon</div></div>
    <div class="stat"><div class="s-lbl">📒 Nakalistang utang</div><div class="s-val num" style="color:var(--alert)">${PESO(totalUtang)}</div><div class="s-sub">hindi pa bayad</div></div>
    <div class="stat"><div class="s-lbl">⚠️ Paubos na stock</div><div class="s-val num" style="color:${low.length?'var(--alert)':'var(--navy)'}">${low.length}</div><div class="s-sub">produkto</div></div>
  </div>
  <div class="dash-cols">
    <div class="cardbox">
      <div class="cardbox-head"><h3>Pinakamabentang Produkto</h3></div>
      <div class="bars">
        ${top.map(p=>`<div class="bar-row" style="align-items:center">
          <img src="${p.photo||''}" alt="" style="width:30px;height:30px;border-radius:7px;object-fit:cover;flex-shrink:0;margin-right:8px;background:var(--surface-2)"
            onerror="this.style.display='none'" />
          <span class="bl">${p.name}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,p.sold/maxSold*100)}%"></div></div>
          <span class="bv num">${p.sold}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="cardbox">
      <div class="cardbox-head"><h3>Paraan ng Bayad</h3></div>
      <div style="padding:18px 20px">
        <div class="split">
          ${Object.entries(byMethod).map(([m,v])=>v>0?`<div style="width:${v/methodTotal*100}%;background:${methodColors[m]}"></div>`:'').join('')}
        </div>
        <div class="legend">
          ${Object.entries(byMethod).map(([m,v])=>`<div class="lg"><span class="sw" style="background:${methodColors[m]}"></span>
            ${({cash:'Cash',gcash:'GCash',maya:'Maya',utang:'Utang'})[m]}<b class="num">${PESO(v)}</b></div>`).join('')}
        </div>
      </div>
      <div class="cardbox-head" style="border-top:1px solid var(--line)"><h3 style="font-size:15px">Kailangang i-order</h3></div>
      <div style="padding:10px 20px 18px">
        ${low.length? low.map(p=>`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px">
          <span>${p.emoji} ${p.name}</span><b style="color:var(--alert)" class="num">${p.stock} na lang</b></div>`).join('')
          : '<div style="color:var(--navy);font-size:13.5px">✓ Sapat pa ang lahat ng stock.</div>'}
      </div>
    </div>
  </div>
  <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:22px">
    Lahat ng numerong ito ay auto-update tuwing may benta o bayad. Subukan: gumawa ng benta sa <b>Benta</b> tab, balik dito — kusang nagbago.
  </p>`;
}

/* ============ MODAL + TOAST ============ */
function openModal(html){ $('modal').innerHTML=html; $('scrim').classList.add('show'); }
function closeModal(){ $('scrim').classList.remove('show'); }
$('scrim').addEventListener('click',e=>{ if(e.target.id==='scrim') closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

let toastT;
function toast(msg){ $('toastMsg').textContent=msg; $('toast').classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>$('toast').classList.remove('show'),1900); }

/* ============ INIT ============ */
['favicon','brandLogo','topLogo'].forEach(id=>{ const el=$(id); if(el) el.src=LOGO; });
renderNav(); go('pos');
</script>
</body>
</html>
